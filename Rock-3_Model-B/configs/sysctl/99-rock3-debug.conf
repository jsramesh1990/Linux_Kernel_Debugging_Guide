# ============================================
# Sysctl Debug Settings for Rock 3 Model B
# Location: /etc/sysctl.d/99-rock3-debug.conf
# ============================================

# -------------------- Core Dump Settings --------------------
# Enable core dumps
kernel.core_pattern = /tmp/core.%e.%p.%t
kernel.core_uses_pid = 1

# Core dump size limit (unlimited)
fs.suid_dumpable = 2

# -------------------- Panic Settings --------------------
# Panic on kernel oops
kernel.panic = 5
kernel.panic_on_oops = 1

# Panic on warn
kernel.panic_on_warn = 1

# Reboot after panic
kernel.panic_on_rcu_stall = 1

# -------------------- Printk Settings --------------------
# Console log level (higher = more verbose)
kernel.printk = 8 4 1 7

# Rate limiting
kernel.printk_ratelimit = 10
kernel.printk_ratelimit_burst = 100

# -------------------- Debug Filesystem --------------------
# Enable debug filesystem
fs.debug = 1

# -------------------- Perf Settings --------------------
# Enable perf events for unprivileged users
kernel.perf_event_paranoid = -1

# Max sample rate
kernel.perf_event_max_sample_rate = 100000

# Max stack trace depth
kernel.perf_event_max_stack = 127

# -------------------- Ftrace Settings --------------------
# Enable ftrace in kernel
kernel.ftrace_enabled = 1

# -------------------- Scheduler Debug --------------------
# Scheduler statistics
kernel.sched_schedstats = 1

# -------------------- Memory Debug --------------------
# Overcommit memory
vm.overcommit_memory = 1

# Dirty ratio
vm.dirty_ratio = 30
vm.dirty_background_ratio = 10

# -------------------- Network Debug --------------------
# Enable kernel network debugging
net.core.netdev_budget = 300
net.core.netdev_budget_usecs = 2000

# TCP debug
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_tw_reuse = 1

# -------------------- Security --------------------
# Disable ASLR for debugging
kernel.randomize_va_space = 0

# -------------------- Tracing --------------------
# Enable trace events
kernel.traceoff_on_warning = 1

# -------------------- Lock Debugging --------------------
# Enable lock debugging
kernel.lock_stat = 1
kernel.lock_stat_debug = 1
