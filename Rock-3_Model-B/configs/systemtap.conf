# ============================================
# SystemTap Configuration for Rock 3 Model B
# ============================================

# SystemTap probe script examples

# -------------------- CPU Probe --------------------
CPU_PROBE='
probe kernel.function("do_sys_open") {
    printf("open: %s\n", argstr)
}
'

# -------------------- Memory Probe --------------------
MEMORY_PROBE='
probe vm.kmalloc {
    printf("kmalloc: %d bytes\n", bytes_requested)
}
'

# -------------------- Network Probe --------------------
NETWORK_PROBE='
probe kernel.function("tcp_v4_connect") {
    printf("connect: %d.%d.%d.%d:%d\n", 
        $sk->__sk_common.skc_daddr & 0xff,
        ($sk->__sk_common.skc_daddr >> 8) & 0xff,
        ($sk->__sk_common.skc_daddr >> 16) & 0xff,
        ($sk->__sk_common.skc_daddr >> 24) & 0xff,
        $sk->__sk_common.skc_dport)
}
'

# -------------------- I/O Probe --------------------
IO_PROBE='
probe ioblock.request {
    printf("I/O request: %s %s %d sectors\n", 
        devname, rw, size)
}
'

# -------------------- SystemTap Options --------------------
# Default SystemTap options
STAP_OPTS="-v -g"

# -------------------- SystemTap Scripts Directory --------------------
STAP_SCRIPTS_DIR="./traces/systemtap/scripts"
